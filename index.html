<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Histogram czasów realizacji</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    h1 { margin-bottom: 16px; }
    #chart { border: 1px solid #ddd; background: #fff; max-width: 100%; height: auto; }
    .muted { color: #555; }
  </style>
</head>
<body>
  <h1>Histogram czasów realizacji</h1>
  <p class="muted">Dane: <code>1 Histogram czasów realizacji.csv</code></p>
  <svg id="chart" width="960" height="520" role="img" aria-label="Histogram czasów realizacji"></svg>
  <p id="status" class="muted"></p>

  <script>
    const CSV_FILE = "1 Histogram czasów realizacji.csv";
    const BIN_WIDTH_DAYS = 25;
    const svg = document.getElementById("chart");
    const statusEl = document.getElementById("status");

    function parseCSV(csvText) {
      const lines = csvText.trim().split(/\r?\n/).filter(Boolean);
      const headerLine = lines.shift();
      if (!headerLine) return [];
      const headers = headerLine.split(";").map((h) => h.trim());
      const timeColIndex = headers.findIndex((h) => h.toLowerCase() === "czas realizacji");
      if (timeColIndex < 0) return [];
      return lines
        .map((line) => line.split(";"))
        .map((parts) => Number(parts[timeColIndex]))
        .filter((n) => Number.isFinite(n));
    }

    function buildBins(values, binWidth) {
      const min = Math.min(...values);
      const max = Math.max(...values);
      const start = Math.floor(min / binWidth) * binWidth;
      const end = Math.ceil(max / binWidth) * binWidth;
      const bins = [];
      for (let b = start; b < end; b += binWidth) {
        bins.push({ from: b, to: b + binWidth, count: 0 });
      }
      values.forEach((v) => {
        let idx = Math.floor((v - start) / binWidth);
        if (idx === bins.length) idx -= 1;
        if (idx >= 0 && idx < bins.length) bins[idx].count += 1;
      });
      return bins;
    }

    function renderHistogram(bins) {
      const width = Number(svg.getAttribute("width"));
      const height = Number(svg.getAttribute("height"));
      const margin = { top: 30, right: 20, bottom: 80, left: 56 };
      const innerW = width - margin.left - margin.right;
      const innerH = height - margin.top - margin.bottom;
      const maxCount = Math.max(...bins.map((b) => b.count), 1);
      const barGap = 6;
      const barW = innerW / bins.length - barGap;

      svg.innerHTML = "";
      const ns = "http://www.w3.org/2000/svg";

      function el(name, attrs) {
        const node = document.createElementNS(ns, name);
        Object.entries(attrs).forEach(([k, v]) => node.setAttribute(k, String(v)));
        svg.appendChild(node);
        return node;
      }

      el("line", { x1: margin.left, y1: margin.top + innerH, x2: margin.left + innerW, y2: margin.top + innerH, stroke: "#222" });
      el("line", { x1: margin.left, y1: margin.top, x2: margin.left, y2: margin.top + innerH, stroke: "#222" });

      bins.forEach((bin, i) => {
        const x = margin.left + i * (barW + barGap);
        const h = (bin.count / maxCount) * innerH;
        const y = margin.top + innerH - h;
        el("rect", { x, y, width: Math.max(barW, 1), height: h, fill: "#3b82f6" });

        const label = `${bin.from}-${bin.to}`;
        const tx = x + Math.max(barW, 1) / 2;
        const ty = margin.top + innerH + 16;
        const text = el("text", { x: tx, y: ty, "text-anchor": "end", transform: `rotate(-45 ${tx} ${ty})`, "font-size": 11, fill: "#222" });
        text.textContent = label;
      });

      const yTicks = 5;
      for (let i = 0; i <= yTicks; i += 1) {
        const value = Math.round((maxCount * i) / yTicks);
        const y = margin.top + innerH - (i / yTicks) * innerH;
        el("line", { x1: margin.left - 4, y1: y, x2: margin.left, y2: y, stroke: "#222" });
        const t = el("text", { x: margin.left - 8, y: y + 4, "text-anchor": "end", "font-size": 12, fill: "#222" });
        t.textContent = value;
      }

      const xTitle = el("text", { x: margin.left + innerW / 2, y: height - 12, "text-anchor": "middle", "font-size": 13, fill: "#222" });
      xTitle.textContent = "Przedział czasu realizacji";
      const yTitle = el("text", { x: 16, y: margin.top + innerH / 2, transform: `rotate(-90 16 ${margin.top + innerH / 2})`, "text-anchor": "middle", "font-size": 13, fill: "#222" });
      yTitle.textContent = "Liczba zleceń";
    }

    async function main() {
      try {
        const response = await fetch(encodeURI(CSV_FILE));
        if (!response.ok) throw new Error(`Błąd HTTP: ${response.status}`);
        const csv = await response.text();
        const values = parseCSV(csv);
        if (!values.length) throw new Error("Brak poprawnych danych liczbowych.");
        const bins = buildBins(values, BIN_WIDTH_DAYS);
        renderHistogram(bins);
        statusEl.textContent = `Wczytano ${values.length} rekordów.`;
      } catch (err) {
        statusEl.textContent = `Nie udało się wygenerować histogramu: ${err.message}`;
      }
    }

    main();
  </script>
</body>
</html>
