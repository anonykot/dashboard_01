<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard: Histogram i Scatterplot</title>
  <style>
    :root {
      --bg-dark: #3a3a3a;
      --panel-light: #d9d9d9;
      --text-dark: #111827;
      --border: #9ca3af;
      --size-s: #16a34a;
      --size-m: #dc2626;
      --size-l: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: var(--bg-dark);
      color: #f9fafb;
    }
    h1 { margin: 0 0 16px 0; }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab-btn {
      border: 1px solid #6b7280;
      border-radius: 8px;
      background: #4b5563;
      color: #fff;
      padding: 8px 12px;
      cursor: pointer;
    }
    .tab-btn.active {
      background: #111827;
      border-color: #111827;
      font-weight: 700;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    select, button, input {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 14px;
      background: #fff;
      color: #111827;
    }
    .panel {
      background: var(--panel-light);
      color: var(--text-dark);
      border: 1px solid #6b7280;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    svg {
      width: 100%;
      height: 68vh;
      min-height: 420px;
      background: var(--panel-light);
      border: 1px solid #6b7280;
      border-radius: 10px;
      display: block;
    }
    .legend {
      display: flex;
      gap: 14px;
      margin-top: 8px;
      font-size: 14px;
      color: var(--text-dark);
      align-items: center;
      flex-wrap: wrap;
    }
    .legend-item { display: inline-flex; gap: 6px; align-items: center; }
    .legend-color { width: 12px; height: 12px; border-radius: 2px; }
    .size-s { color: var(--size-s); font-weight: 700; }
    .size-m { color: var(--size-m); font-weight: 700; }
    .size-l { color: var(--size-l); font-weight: 700; }
    .table-wrap {
      background: var(--panel-light);
      color: var(--text-dark);
      border: 1px solid #6b7280;
      border-radius: 10px;
      padding: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #9ca3af;
      padding: 6px 8px;
      font-size: 14px;
      vertical-align: middle;
      background: #ececec;
    }
    td input, td select { width: 100%; }
    .status {
      min-height: 18px;
      font-size: 14px;
      margin: 4px 0 8px;
      color: #111827;
    }
    .status.error { color: #991b1b; font-weight: 700; }
    .editor {
      display: none;
      background: #ececec;
      border: 1px solid #9ca3af;
      border-radius: 8px;
      padding: 10px;
      margin-top: 10px;
      color: #111827;
    }
    .editor.active { display: block; }
    .editor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
      margin: 8px 0;
    }
    #error {
      display: none;
      color: #fecaca;
      font-weight: 700;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>Dashboard czasów realizacji</h1>

  <div class="tabs" role="tablist" aria-label="Zakładki wykresów">
    <button class="tab-btn active" id="tabHistogramBtn" role="tab" aria-controls="tabHistogram" aria-selected="true">Histogram</button>
    <button class="tab-btn" id="tabScatterBtn" role="tab" aria-controls="tabScatter" aria-selected="false">Scatterplot</button>
  </div>

  <section id="tabHistogram" class="tab-panel active" role="tabpanel" aria-labelledby="tabHistogramBtn">
    <div class="panel">
      <div class="controls">
        <label for="histSizeFilter">Deklarowany rozmiar:</label>
        <select id="histSizeFilter">
          <option value="ALL">Wszystkie</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
        </select>
      </div>
      <svg id="histChart" viewBox="0 0 980 540" preserveAspectRatio="none" aria-label="Histogram czasów realizacji"></svg>
      <div class="legend">
        <span class="legend-item"><span class="legend-color" style="background:var(--size-s)"></span><span class="size-s">S</span></span>
        <span class="legend-item"><span class="legend-color" style="background:var(--size-m)"></span><span class="size-m">M</span></span>
        <span class="legend-item"><span class="legend-color" style="background:var(--size-l)"></span><span class="size-l">L</span></span>
      </div>
      <div id="histEditor" class="editor" aria-live="polite">
        <div id="histEditorText"></div>
        <div class="controls">
          <label for="histEditCount">Nowa liczność:</label>
          <input id="histEditCount" type="number" min="0" step="1" />
          <button type="button" id="histEditSave">Zapisz</button>
          <button type="button" id="histEditCancel">Anuluj</button>
        </div>
      </div>
      <div id="histStatus" class="status" role="status" aria-live="polite"></div>
    </div>

    <div class="table-wrap">
      <div class="controls">
        <strong>Dane histogramu</strong>
        <button type="button" id="histAddRow">Dodaj wiersz</button>
      </div>
      <table aria-label="Tabela danych histogramu">
        <thead>
          <tr>
            <th>#</th>
            <th>Deklarowany rozmiar</th>
            <th>Czas realizacji</th>
            <th>Akcje</th>
          </tr>
        </thead>
        <tbody id="histTableBody"></tbody>
      </table>
    </div>
  </section>

  <section id="tabScatter" class="tab-panel" role="tabpanel" aria-labelledby="tabScatterBtn">
    <div class="panel">
      <svg id="scatterChart" viewBox="0 0 980 540" preserveAspectRatio="none" aria-label="Scatterplot czasów realizacji"></svg>
      <div class="legend">
        <span class="legend-item"><span class="legend-color" style="background:var(--size-s)"></span><span class="size-s">S</span></span>
        <span class="legend-item"><span class="legend-color" style="background:var(--size-m)"></span><span class="size-m">M</span></span>
        <span class="legend-item"><span class="legend-color" style="background:var(--size-l)"></span><span class="size-l">L</span></span>
      </div>
      <div id="scatterEditor" class="editor" aria-live="polite">
        <div id="scatterEditorText"></div>
        <div class="editor-grid">
          <label>Data zakończenia
            <input id="scatterEditDate" type="date" />
          </label>
          <label>Deklarowany rozmiar
            <select id="scatterEditSize">
              <option value="S">S</option>
              <option value="M">M</option>
              <option value="L">L</option>
            </select>
          </label>
          <label>Czas realizacji
            <input id="scatterEditDuration" type="number" min="0" step="0.01" />
          </label>
        </div>
        <div class="controls">
          <button type="button" id="scatterEditSave">Zapisz</button>
          <button type="button" id="scatterEditCancel">Anuluj</button>
        </div>
      </div>
      <div id="scatterStatus" class="status" role="status" aria-live="polite"></div>
    </div>

    <div class="table-wrap">
      <div class="controls">
        <strong>Dane scatterplot</strong>
        <button type="button" id="scatterAddRow">Dodaj wiersz</button>
      </div>
      <table aria-label="Tabela danych scatterplot">
        <thead>
          <tr>
            <th>#</th>
            <th>Data ukończenia</th>
            <th>Deklarowany rozmiar</th>
            <th>Czas realizacji</th>
            <th>Akcje</th>
          </tr>
        </thead>
        <tbody id="scatterTableBody"></tbody>
      </table>
    </div>
  </section>

  <div id="error"></div>

  <script>
    (async function init() {
      const HIST_CSV = '1 Histogram czasów realizacji.csv';
      const SCATTER_CSV = '2. Scatterplot czasów realizacji.csv';
      const COLORS = { S: '#16a34a', M: '#dc2626', L: '#2563eb' };
      const getColor = (sizeValue) => COLORS[String(sizeValue || '').toUpperCase()] || '#6b7280';

      const tabHistogramBtn = document.getElementById('tabHistogramBtn');
      const tabScatterBtn = document.getElementById('tabScatterBtn');
      const tabHistogram = document.getElementById('tabHistogram');
      const tabScatter = document.getElementById('tabScatter');
      const errorEl = document.getElementById('error');

      const histChart = document.getElementById('histChart');
      const histSizeFilter = document.getElementById('histSizeFilter');
      const histTableBody = document.getElementById('histTableBody');
      const histAddRow = document.getElementById('histAddRow');
      const histStatus = document.getElementById('histStatus');
      const histEditor = document.getElementById('histEditor');
      const histEditorText = document.getElementById('histEditorText');
      const histEditCount = document.getElementById('histEditCount');
      const histEditSave = document.getElementById('histEditSave');
      const histEditCancel = document.getElementById('histEditCancel');

      const scatterChart = document.getElementById('scatterChart');
      const scatterTableBody = document.getElementById('scatterTableBody');
      const scatterAddRow = document.getElementById('scatterAddRow');
      const scatterStatus = document.getElementById('scatterStatus');
      const scatterEditor = document.getElementById('scatterEditor');
      const scatterEditorText = document.getElementById('scatterEditorText');
      const scatterEditDate = document.getElementById('scatterEditDate');
      const scatterEditSize = document.getElementById('scatterEditSize');
      const scatterEditDuration = document.getElementById('scatterEditDuration');
      const scatterEditSave = document.getElementById('scatterEditSave');
      const scatterEditCancel = document.getElementById('scatterEditCancel');

      let histRows = [];
      let scatterRows = [];
      let histSelectedSize = 'ALL';
      let histEditContext = null;
      let scatterEditContext = null;

      const showTab = (tab) => {
        const histActive = tab === 'hist';
        tabHistogram.classList.toggle('active', histActive);
        tabScatter.classList.toggle('active', !histActive);
        tabHistogramBtn.classList.toggle('active', histActive);
        tabScatterBtn.classList.toggle('active', !histActive);
        tabHistogramBtn.setAttribute('aria-selected', String(histActive));
        tabScatterBtn.setAttribute('aria-selected', String(!histActive));
      };

      tabHistogramBtn.addEventListener('click', () => showTab('hist'));
      tabScatterBtn.addEventListener('click', () => showTab('scatter'));

      const normalizeSize = (value) => {
        const v = String(value || '').trim().toUpperCase();
        return v === 'S' || v === 'M' || v === 'L' ? v : null;
      };
      const parseNumeric = (v) => Number(String(v || '').replace(',', '.'));
      const parseDateFromCsv = (ddmmyyyy) => {
        const parts = String(ddmmyyyy || '').trim().split('.');
        if (parts.length !== 3) return null;
        const [d, m, y] = parts.map((p) => Number(p));
        if (!d || !m || !y) return null;
        const dt = new Date(y, m - 1, d);
        return Number.isNaN(dt.getTime()) ? null : dt;
      };
      const toDateInputValue = (dt) => {
        const y = dt.getFullYear();
        const m = String(dt.getMonth() + 1).padStart(2, '0');
        const d = String(dt.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      };
      const fromDateInputValue = (value) => {
        const dt = new Date(value);
        return Number.isNaN(dt.getTime()) ? null : dt;
      };
      const displayDate = (dt) => {
        const d = String(dt.getDate()).padStart(2, '0');
        const m = String(dt.getMonth() + 1).padStart(2, '0');
        const y = dt.getFullYear();
        return `${d}.${m}.${y}`;
      };
      const sizeClass = (size) => size === 'S' ? 'size-s' : size === 'M' ? 'size-m' : 'size-l';
      const setStatus = (el, message, isError = false) => {
        el.textContent = message || '';
        el.className = isError ? 'status error' : 'status';
      };

      const getHistSourceRows = () => histSelectedSize === 'ALL'
        ? histRows
        : histRows.filter((row) => row.size === histSelectedSize);

      const createHistBins = (rows) => {
        if (!rows.length) return null;
        const values = rows.map((r) => r.duration);
        const min = Math.min(...values);
        const max = Math.max(...values);
        const range = max - min;
        const binCount = range === 0 ? 1 : 10;
        const width = range === 0 ? 1 : range / binCount;
        const bins = Array.from({ length: binCount }, (_, i) => ({
          from: min + i * width,
          to: i === binCount - 1 ? max : min + (i + 1) * width,
          isLast: i === binCount - 1,
          s: 0, m: 0, l: 0
        }));
        rows.forEach(({ size, duration }) => {
          let idx = range === 0 ? 0 : Math.floor((duration - min) / width);
          if (idx >= binCount) idx = binCount - 1;
          bins[idx][size.toLowerCase()] += 1;
        });
        return bins;
      };

      const setHistogramBinCount = (size, bin, newCount) => {
        const inBin = (d) => d >= bin.from && (bin.isLast ? d <= bin.to : d < bin.to);
        const indexes = [];
        for (let i = 0; i < histRows.length; i++) {
          if (histRows[i].size === size && inBin(histRows[i].duration)) indexes.push(i);
        }
        const current = indexes.length;
        if (newCount === current) return;
        if (newCount > current) {
          const duration = Number(((bin.from + bin.to) / 2).toFixed(2));
          for (let i = 0; i < newCount - current; i++) histRows.push({ size, duration });
          return;
        }
        for (let i = current - 1; i >= newCount; i--) histRows.splice(indexes[i], 1);
      };

      const renderHistogram = () => {
        histChart.innerHTML = '';
        histEditor.classList.remove('active');
        histEditContext = null;
        const rows = getHistSourceRows();
        const bins = createHistBins(rows);
        if (!bins) {
          const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          text.setAttribute('x', '490');
          text.setAttribute('y', '260');
          text.setAttribute('text-anchor', 'middle');
          text.setAttribute('fill', '#4b5563');
          text.textContent = 'Brak danych dla wybranego rozmiaru';
          histChart.appendChild(text);
          return;
        }

        const W = 980, H = 540;
        const M = { t: 24, r: 24, b: 72, l: 56 };
        const plotW = W - M.l - M.r;
        const plotH = H - M.t - M.b;
        const maxY = Math.max(...bins.map((b) => b.s + b.m + b.l), 1);
        const barStep = plotW / bins.length;
        const barW = barStep * 0.72;

        for (let i = 0; i <= 5; i++) {
          const y = H - M.b - (i / 5) * plotH;
          const val = Math.round((maxY / 5) * i);
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', String(M.l));
          line.setAttribute('x2', String(W - M.r));
          line.setAttribute('y1', String(y));
          line.setAttribute('y2', String(y));
          line.setAttribute('stroke', '#9ca3af');
          histChart.appendChild(line);

          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', String(M.l - 8));
          label.setAttribute('y', String(y + 4));
          label.setAttribute('text-anchor', 'end');
          label.setAttribute('font-size', '11');
          label.setAttribute('fill', '#1f2937');
          label.textContent = String(val);
          histChart.appendChild(label);
        }

        const xAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        xAxis.setAttribute('x1', String(M.l));
        xAxis.setAttribute('y1', String(H - M.b));
        xAxis.setAttribute('x2', String(W - M.r));
        xAxis.setAttribute('y2', String(H - M.b));
        xAxis.setAttribute('stroke', '#111827');
        histChart.appendChild(xAxis);

        const yAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        yAxis.setAttribute('x1', String(M.l));
        yAxis.setAttribute('y1', String(M.t));
        yAxis.setAttribute('x2', String(M.l));
        yAxis.setAttribute('y2', String(H - M.b));
        yAxis.setAttribute('stroke', '#111827');
        histChart.appendChild(yAxis);

        bins.forEach((bin, i) => {
          const x = M.l + i * barStep + (barStep - barW) / 2;
          let yBottom = H - M.b;
          ['s', 'm', 'l'].forEach((k) => {
            const count = bin[k];
            if (!count) return;
            const h = (count / maxY) * plotH;
            yBottom -= h;
            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            rect.setAttribute('x', String(x));
            rect.setAttribute('y', String(yBottom));
            rect.setAttribute('width', String(barW));
            rect.setAttribute('height', String(h));
            rect.setAttribute('fill', getColor(k));
            rect.setAttribute('opacity', '0.9');
            rect.style.cursor = 'pointer';
            rect.setAttribute('tabindex', '0');
            const size = k.toUpperCase();
            const openEditor = () => {
              histEditContext = { size, bin, count };
              histEditCount.value = String(count);
              histEditorText.textContent = `Edycja ${size} w przedziale ${Math.round(bin.from)}-${Math.round(bin.to)} (obecnie: ${count})`;
              histEditor.classList.add('active');
              setStatus(histStatus, '');
            };
            rect.addEventListener('click', openEditor);
            rect.addEventListener('keydown', (e) => {
              if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                openEditor();
              }
            });
            histChart.appendChild(rect);
          });

          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', String(x + barW / 2));
          label.setAttribute('y', String(H - M.b + 17));
          label.setAttribute('text-anchor', 'middle');
          label.setAttribute('font-size', '10');
          label.setAttribute('fill', '#1f2937');
          label.textContent = `${Math.round(bin.from)}-${Math.round(bin.to)}`;
          histChart.appendChild(label);
        });
      };

      const renderHistTable = () => {
        histTableBody.innerHTML = histRows.map((r, idx) => `
          <tr data-index="${idx}">
            <td>${idx + 1}</td>
            <td>
              <select class="hist-size ${sizeClass(r.size)}" aria-label="Rozmiar ${idx + 1}">
                <option value="S" ${r.size === 'S' ? 'selected' : ''}>S</option>
                <option value="M" ${r.size === 'M' ? 'selected' : ''}>M</option>
                <option value="L" ${r.size === 'L' ? 'selected' : ''}>L</option>
              </select>
            </td>
            <td><input class="hist-duration" type="number" min="0" step="0.01" value="${r.duration}" /></td>
            <td><button type="button" class="hist-delete">Usuń</button></td>
          </tr>
        `).join('');
      };

      const renderHistogramAll = () => {
        renderHistogram();
        renderHistTable();
      };

      histSizeFilter.addEventListener('change', (e) => {
        histSelectedSize = e.target.value;
        renderHistogram();
      });

      histAddRow.addEventListener('click', () => {
        histRows.push({ size: histSelectedSize === 'ALL' ? 'S' : histSelectedSize, duration: 0 });
        renderHistogramAll();
        setStatus(histStatus, 'Dodano nowy wiersz.');
      });

      histTableBody.addEventListener('change', (e) => {
        const row = e.target.closest('tr');
        if (!row) return;
        const idx = Number(row.dataset.index);
        if (!Number.isInteger(idx) || !histRows[idx]) return;

        if (e.target.classList.contains('hist-size')) {
          const size = normalizeSize(e.target.value);
          if (!size) return;
          histRows[idx].size = size;
          e.target.className = `hist-size ${sizeClass(size)}`;
        }
        if (e.target.classList.contains('hist-duration')) {
          const duration = parseNumeric(e.target.value);
          if (!Number.isFinite(duration) || duration < 0) {
            setStatus(histStatus, 'Podaj poprawny czas realizacji (>= 0).', true);
            e.target.value = String(histRows[idx].duration);
            return;
          }
          histRows[idx].duration = duration;
        }

        renderHistogramAll();
        setStatus(histStatus, 'Zaktualizowano dane histogramu.');
      });

      histTableBody.addEventListener('click', (e) => {
        if (!e.target.classList.contains('hist-delete')) return;
        const row = e.target.closest('tr');
        if (!row) return;
        const idx = Number(row.dataset.index);
        if (!Number.isInteger(idx) || !histRows[idx]) return;
        histRows.splice(idx, 1);
        renderHistogramAll();
        setStatus(histStatus, 'Usunięto wiersz histogramu.');
      });

      histEditSave.addEventListener('click', () => {
        if (!histEditContext) return;
        const next = Number(histEditCount.value);
        if (!Number.isInteger(next) || next < 0) {
          setStatus(histStatus, 'Liczność musi być liczbą całkowitą >= 0.', true);
          return;
        }
        setHistogramBinCount(histEditContext.size, histEditContext.bin, next);
        histEditor.classList.remove('active');
        histEditContext = null;
        renderHistogramAll();
        setStatus(histStatus, 'Zapisano edycję słupka histogramu.');
      });

      histEditCancel.addEventListener('click', () => {
        histEditor.classList.remove('active');
        histEditContext = null;
        setStatus(histStatus, 'Anulowano edycję słupka.');
      });

      const linearTrend = (points) => {
        const pointsCount = points.length;
        if (pointsCount < 2) return null;
        const sumX = points.reduce((acc, point) => acc + point.x, 0);
        const sumY = points.reduce((acc, point) => acc + point.y, 0);
        const sumXY = points.reduce((acc, point) => acc + point.x * point.y, 0);
        const sumXSquared = points.reduce((acc, point) => acc + point.x * point.x, 0);
        const denominator = pointsCount * sumXSquared - sumX * sumX;
        if (!denominator) return null;
        const slope = (pointsCount * sumXY - sumX * sumY) / denominator;
        const intercept = (sumY - slope * sumX) / pointsCount;
        return { slope, intercept };
      };

      const renderScatter = () => {
        scatterChart.innerHTML = '';
        scatterEditor.classList.remove('active');
        scatterEditContext = null;

        if (!scatterRows.length) {
          const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          text.setAttribute('x', '490');
          text.setAttribute('y', '260');
          text.setAttribute('text-anchor', 'middle');
          text.setAttribute('fill', '#4b5563');
          text.textContent = 'Brak danych scatterplot';
          scatterChart.appendChild(text);
          return;
        }

        const W = 980, H = 540;
        const M = { t: 24, r: 24, b: 72, l: 64 };
        const plotW = W - M.l - M.r;
        const plotH = H - M.t - M.b;

        const minX = Math.min(...scatterRows.map((r) => r.date.getTime()));
        const maxX = Math.max(...scatterRows.map((r) => r.date.getTime()));
        const minY = 0;
        const maxY = Math.max(...scatterRows.map((r) => r.duration), 1);
        const xSpan = Math.max(maxX - minX, 1);
        const ySpan = Math.max(maxY - minY, 1);

        const xScale = (x) => M.l + ((x - minX) / xSpan) * plotW;
        const yScale = (y) => H - M.b - ((y - minY) / ySpan) * plotH;

        for (let i = 0; i <= 5; i++) {
          const y = H - M.b - (i / 5) * plotH;
          const val = Math.round((maxY / 5) * i);
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', String(M.l));
          line.setAttribute('x2', String(W - M.r));
          line.setAttribute('y1', String(y));
          line.setAttribute('y2', String(y));
          line.setAttribute('stroke', '#9ca3af');
          scatterChart.appendChild(line);

          const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          txt.setAttribute('x', String(M.l - 8));
          txt.setAttribute('y', String(y + 4));
          txt.setAttribute('text-anchor', 'end');
          txt.setAttribute('font-size', '11');
          txt.setAttribute('fill', '#1f2937');
          txt.textContent = String(val);
          scatterChart.appendChild(txt);
        }

        const xAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        xAxis.setAttribute('x1', String(M.l));
        xAxis.setAttribute('y1', String(H - M.b));
        xAxis.setAttribute('x2', String(W - M.r));
        xAxis.setAttribute('y2', String(H - M.b));
        xAxis.setAttribute('stroke', '#111827');
        scatterChart.appendChild(xAxis);

        const yAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        yAxis.setAttribute('x1', String(M.l));
        yAxis.setAttribute('y1', String(M.t));
        yAxis.setAttribute('x2', String(M.l));
        yAxis.setAttribute('y2', String(H - M.b));
        yAxis.setAttribute('stroke', '#111827');
        scatterChart.appendChild(yAxis);

        const xTicks = 6;
        for (let i = 0; i <= xTicks; i++) {
          const ts = minX + (xSpan / xTicks) * i;
          const x = xScale(ts);
          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', String(x));
          label.setAttribute('y', String(H - M.b + 18));
          label.setAttribute('text-anchor', 'middle');
          label.setAttribute('font-size', '10');
          label.setAttribute('fill', '#1f2937');
          label.textContent = displayDate(new Date(ts));
          scatterChart.appendChild(label);
        }

        ['S', 'M', 'L'].forEach((size) => {
          const points = scatterRows
            .filter((r) => r.size === size)
            .map((r) => ({ x: r.date.getTime(), y: r.duration }))
            .sort((a, b) => a.x - b.x);

          const trend = linearTrend(points);
          if (trend) {
            const x1 = Math.min(...points.map((p) => p.x));
            const x2 = Math.max(...points.map((p) => p.x));
            const y1 = trend.slope * x1 + trend.intercept;
            const y2 = trend.slope * x2 + trend.intercept;
            const trendLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            trendLine.setAttribute('x1', String(xScale(x1)));
            trendLine.setAttribute('y1', String(yScale(y1)));
            trendLine.setAttribute('x2', String(xScale(x2)));
            trendLine.setAttribute('y2', String(yScale(y2)));
            trendLine.setAttribute('stroke', getColor(size));
            trendLine.setAttribute('stroke-width', '2');
            trendLine.setAttribute('stroke-dasharray', '6 4');
            scatterChart.appendChild(trendLine);
          }
        });

        scatterRows.forEach((row, idx) => {
          const cx = xScale(row.date.getTime());
          const cy = yScale(row.duration);
          const point = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          point.setAttribute('cx', String(cx));
          point.setAttribute('cy', String(cy));
          point.setAttribute('r', '6');
          point.setAttribute('fill', getColor(row.size));
          point.setAttribute('stroke', '#111827');
          point.setAttribute('stroke-width', '1');
          point.style.cursor = 'pointer';
          point.setAttribute('tabindex', '0');
          point.setAttribute('role', 'button');
          point.setAttribute('aria-label', `Edytuj punkt ${idx + 1}: data ${displayDate(row.date)}, rozmiar ${row.size}, czas realizacji ${row.duration}`);

          const openEditor = () => {
            scatterEditContext = idx;
            scatterEditorText.textContent = `Edycja punktu ${idx + 1}`;
            scatterEditDate.value = toDateInputValue(row.date);
            scatterEditSize.value = row.size;
            scatterEditDuration.value = String(row.duration);
            scatterEditor.classList.add('active');
            setStatus(scatterStatus, '');
          };

          point.addEventListener('click', openEditor);
          point.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              openEditor();
            }
          });

          scatterChart.appendChild(point);
        });
      };

      const renderScatterTable = () => {
        scatterTableBody.innerHTML = scatterRows.map((r, idx) => `
          <tr data-index="${idx}">
            <td>${idx + 1}</td>
            <td><input class="scatter-date" type="date" value="${toDateInputValue(r.date)}" /></td>
            <td>
              <select class="scatter-size ${sizeClass(r.size)}">
                <option value="S" ${r.size === 'S' ? 'selected' : ''}>S</option>
                <option value="M" ${r.size === 'M' ? 'selected' : ''}>M</option>
                <option value="L" ${r.size === 'L' ? 'selected' : ''}>L</option>
              </select>
            </td>
            <td><input class="scatter-duration" type="number" min="0" step="0.01" value="${r.duration}" /></td>
            <td><button type="button" class="scatter-delete">Usuń</button></td>
          </tr>
        `).join('');
      };

      const renderScatterAll = () => {
        renderScatter();
        renderScatterTable();
      };

      scatterAddRow.addEventListener('click', () => {
        const now = new Date();
        scatterRows.push({ date: now, size: 'S', duration: 0 });
        renderScatterAll();
        setStatus(scatterStatus, 'Dodano nowy punkt.');
      });

      scatterTableBody.addEventListener('change', (e) => {
        const tr = e.target.closest('tr');
        if (!tr) return;
        const idx = Number(tr.dataset.index);
        if (!Number.isInteger(idx) || !scatterRows[idx]) return;
        const row = scatterRows[idx];

        if (e.target.classList.contains('scatter-date')) {
          const dt = fromDateInputValue(e.target.value);
          if (!dt) {
            setStatus(scatterStatus, 'Niepoprawna data.', true);
            e.target.value = toDateInputValue(row.date);
            return;
          }
          row.date = dt;
        }

        if (e.target.classList.contains('scatter-size')) {
          const size = normalizeSize(e.target.value);
          if (!size) return;
          row.size = size;
          e.target.className = `scatter-size ${sizeClass(size)}`;
        }

        if (e.target.classList.contains('scatter-duration')) {
          const val = parseNumeric(e.target.value);
          if (!Number.isFinite(val) || val < 0) {
            setStatus(scatterStatus, 'Czas realizacji musi być >= 0.', true);
            e.target.value = String(row.duration);
            return;
          }
          row.duration = val;
        }

        renderScatterAll();
        setStatus(scatterStatus, 'Zaktualizowano dane scatterplot.');
      });

      scatterTableBody.addEventListener('click', (e) => {
        if (!e.target.classList.contains('scatter-delete')) return;
        const tr = e.target.closest('tr');
        if (!tr) return;
        const idx = Number(tr.dataset.index);
        if (!Number.isInteger(idx) || !scatterRows[idx]) return;
        scatterRows.splice(idx, 1);
        renderScatterAll();
        setStatus(scatterStatus, 'Usunięto punkt.');
      });

      scatterEditSave.addEventListener('click', () => {
        if (scatterEditContext === null) return;
        const idx = Number(scatterEditContext);
        const target = scatterRows[idx];
        if (!target) return;

        const date = fromDateInputValue(scatterEditDate.value);
        const size = normalizeSize(scatterEditSize.value);
        const duration = parseNumeric(scatterEditDuration.value);

        if (!date) {
          setStatus(scatterStatus, 'Niepoprawna data punktu.', true);
          return;
        }
        if (!size) {
          setStatus(scatterStatus, 'Niepoprawny rozmiar punktu.', true);
          return;
        }
        if (!Number.isFinite(duration) || duration < 0) {
          setStatus(scatterStatus, 'Niepoprawny czas realizacji punktu.', true);
          return;
        }

        target.date = date;
        target.size = size;
        target.duration = duration;
        scatterEditContext = null;
        scatterEditor.classList.remove('active');
        renderScatterAll();
        setStatus(scatterStatus, 'Zapisano edycję punktu.');
      });

      scatterEditCancel.addEventListener('click', () => {
        scatterEditContext = null;
        scatterEditor.classList.remove('active');
        setStatus(scatterStatus, 'Anulowano edycję punktu.');
      });

      try {
        const [histRes, scatterRes] = await Promise.all([fetch(HIST_CSV), fetch(SCATTER_CSV)]);
        if (!histRes.ok) throw new Error('Nie udało się wczytać pliku histogramu.');
        if (!scatterRes.ok) throw new Error('Nie udało się wczytać pliku scatterplot.');

        const histRaw = await histRes.text();
        const scatterRaw = await scatterRes.text();

        histRows = histRaw
          .split(/\r?\n/)
          .map((l) => l.trim())
          .filter(Boolean)
          .slice(1)
          .map((line) => {
            const [sizeRaw, durationRaw] = line.split(';').map((v) => v.trim());
            const size = normalizeSize(sizeRaw);
            const duration = parseNumeric(durationRaw);
            return size && Number.isFinite(duration) ? { size, duration } : null;
          })
          .filter(Boolean);

        scatterRows = scatterRaw
          .split(/\r?\n/)
          .map((l) => l.trim())
          .filter(Boolean)
          .slice(1)
          .map((line) => {
            const [dateRaw, sizeRaw, durationRaw] = line.split(';').map((v) => v.trim());
            const date = parseDateFromCsv(dateRaw);
            const size = normalizeSize(sizeRaw);
            const duration = parseNumeric(durationRaw);
            return date && size && Number.isFinite(duration) ? { date, size, duration } : null;
          })
          .filter(Boolean);

        if (!histRows.length) throw new Error('Brak poprawnych danych histogramu.');
        if (!scatterRows.length) throw new Error('Brak poprawnych danych scatterplot.');

        renderHistogramAll();
        renderScatterAll();
        errorEl.style.display = 'none';
      } catch (error) {
        console.error(error);
        errorEl.style.display = 'block';
        errorEl.textContent = error?.message || 'Wystąpił błąd podczas ładowania danych.';
      }
    })();
  </script>
</body>
</html>
